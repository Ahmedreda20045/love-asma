<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ahmed ❤️ Asmaa</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}

.card{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
backdrop-filter:blur(8px);
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
font-size:22px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
cursor:pointer;
}

.hidden{
display:none;
font-size:24px;
margin-top:20px;
}

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-100vh);opacity:0}
}

</style>
</head>

<body>

<div class="card">

<h1>Ahmed ❤️ Asmaa</h1>

<p id="days"></p>

<button onclick="showLove()">اضغطي هنا ❤️</button>

<p id="loveText" class="hidden">
يا أسما ❤️  
من يوم 9/12/2025  
وانتي بقيتي أجمل حاجة حصلتلي  
ضحكتك بتخليني أنسى أي حاجة وحشة  
وأتمنى نفضل مع بعض دايماً انتي
بنتي واختي وصاحبتي وكل حاجه حلوه في حياتي بحبك مووت
<br><br>
I Love You Forever ❤️
</p>

</div>

<script>

function showLove(){
document.getElementById("loveText").style.display="block";
}

let startDate = new Date("2025-12-09");
let today = new Date();

let diff = today - startDate;
let days = Math.floor(diff / (1000*60*60*24));

document.getElementById("days").innerText =
"بقالنا مع بعض " + days + " يوم ❤️";

function createHeart(){
let heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
